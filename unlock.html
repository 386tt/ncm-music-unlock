<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐解锁 — NCM · QQ音乐</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* =========================================
   Apple Design System — CSS Variables
   ========================================= */
:root {
  --bg-base: #f5f5f7;
  --bg-elevated: rgba(255,255,255,0.72);
  --bg-sunken: rgba(0,0,0,0.04);
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-press: #0060c7;
  --success: #34c759;
  --warning: #ff9f0a;
  --error: #ff3b30;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.08), 0 8px 20px rgba(0,0,0,0.04);
  --ease-spring: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Auto dark mode */
@media (prefers-color-scheme: dark) {
  :root {
    --bg-base: #000000;
    --bg-elevated: rgba(255,255,255,0.08);
    --bg-sunken: rgba(255,255,255,0.04);
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #6e6e73;
    --accent: #2997ff;
    --accent-hover: #40a9ff;
    --accent-press: #0077ed;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
  }
}

/* Manual dark mode override */
:root[data-theme="dark"] {
  --bg-base: #000000;
  --bg-elevated: rgba(255,255,255,0.08);
  --bg-sunken: rgba(255,255,255,0.04);
  --text-primary: #f5f5f7;
  --text-secondary: #98989d;
  --text-tertiary: #6e6e73;
  --accent: #2997ff;
  --accent-hover: #40a9ff;
  --accent-press: #0077ed;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
}

/* Manual light mode override */
:root[data-theme="light"] {
  --bg-base: #f5f5f7;
  --bg-elevated: rgba(255,255,255,0.72);
  --bg-sunken: rgba(0,0,0,0.04);
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-press: #0060c7;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.08), 0 8px 20px rgba(0,0,0,0.04);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
  line-height: 1.47059;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(0,113,227,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(52,199,89,0.04) 0%, transparent 55%);
}
/* =========================================
   Header
   ========================================= */
.header { text-align: center; padding: 3.5rem 1rem 1.5rem; }
.header h1 {
  font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text-primary); line-height: 1.1;
}
.header p { color: var(--text-secondary); margin-top: 0.5rem; font-size: 1.0625rem; font-weight: 400; letter-spacing: -0.01em; }

.container { max-width: 780px; margin: 0 auto; padding: 0 1.5rem 4rem; }

/* Theme Toggle */
.theme-toggle {
  position: fixed; top: 1.25rem; right: 1.25rem;
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: var(--bg-elevated);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  box-shadow: var(--shadow-sm);
  cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; transition: all 0.3s var(--ease-spring);
  color: var(--text-primary);
}
.theme-toggle:hover { transform: scale(1.08); box-shadow: var(--shadow-md); }
.theme-toggle:active { transform: scale(0.9); }

/* =========================================
   Drop Zone — Frosted Glass + Dashed Ring
   ========================================= */
.drop-zone {
  position: relative;
  border-radius: var(--radius-lg);
  padding: 3.5rem 2rem; text-align: center;
  transition: all 0.4s var(--ease-spring);
  background: var(--bg-elevated);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  box-shadow: var(--shadow-md);
  cursor: pointer;
  border: 2px dashed rgba(0,0,0,0.12);
  overflow: hidden;
}
@media (prefers-color-scheme: dark) { .drop-zone { border-color: rgba(255,255,255,0.15); } }

.drop-zone::before {
  content: ''; position: absolute; inset: -1px; z-index: -1;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--accent), #5ac8fa, var(--accent));
  opacity: 0; transition: opacity 0.4s var(--ease-spring);
  filter: blur(20px);
}
.drop-zone.dragover::before { opacity: 0.3; animation: breathe 2s var(--ease-spring) infinite; }
.drop-zone.dragover {
  border-color: var(--accent);
  transform: scale(1.02);
  box-shadow: var(--shadow-lg), 0 0 40px rgba(0,113,227,0.15);
}
.drop-zone .icon {
  font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.8;
  transition: transform 0.3s var(--ease-bounce);
}
.drop-zone.dragover .icon { transform: scale(1.15); }
.drop-zone .title { font-size: 1.0625rem; font-weight: 600; margin-bottom: 0.4rem; letter-spacing: -0.01em; }
.drop-zone .hint { font-size: 0.875rem; color: var(--text-tertiary); line-height: 1.5; }
.drop-zone input[type=file] { display: none; }
/* =========================================
   Status Bar & Progress
   ========================================= */
.status-bar {
  display: flex; align-items: center; gap: 1rem;
  margin-top: 1.25rem;
  padding: 0.75rem 1.25rem;
  background: var(--bg-elevated);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  font-size: 0.875rem;
}
.status-bar .count { font-weight: 600; color: var(--accent); min-width: 4rem; }
.progress-bar-wrap { flex: 1; height: 4px; background: var(--bg-sunken); border-radius: 2px; overflow: hidden; }
.progress-bar-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.5s var(--ease-spring);
  position: relative;
}
.progress-bar-fill::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  animation: shimmer 2.5s infinite;
}

/* =========================================
   Toolbar
   ========================================= */
.toolbar { display: flex; gap: 0.5rem; margin-top: 1.25rem; flex-wrap: wrap; }
.toolbar button {
  padding: 0.6rem 1.5rem; border: none;
  border-radius: var(--radius-full);
  background: var(--bg-elevated);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 0.875rem; font-weight: 500;
  font-family: inherit; letter-spacing: -0.01em;
  transition: all 0.25s var(--ease-spring);
  box-shadow: var(--shadow-sm);
}
.toolbar button:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.toolbar button:active { transform: translateY(0) scale(0.97); }
.toolbar button.primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 8px rgba(0,113,227,0.3);
}
.toolbar button.primary:hover { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(0,113,227,0.4); }
.toolbar button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
/* =========================================
   Result Cards
   ========================================= */
.results { margin-top: 1.25rem; }
.result-card {
  display: flex; align-items: flex-start; gap: 1rem;
  padding: 1rem;
  background: var(--bg-elevated);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-radius: var(--radius-md);
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow-sm);
  transition: all 0.3s var(--ease-spring);
  animation: cardIn 0.45s var(--ease-spring) both;
}
.result-card:nth-child(1) { animation-delay: 0s; }
.result-card:nth-child(2) { animation-delay: 0.06s; }
.result-card:nth-child(3) { animation-delay: 0.12s; }
.result-card:nth-child(4) { animation-delay: 0.18s; }
.result-card:nth-child(5) { animation-delay: 0.24s; }
.result-card:nth-child(n+6) { animation-delay: 0.28s; }
.result-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.result-card .cover {
  width: 56px; height: 56px;
  border-radius: var(--radius-sm);
  background: var(--bg-sunken);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.result-card .cover img { width: 100%; height: 100%; object-fit: cover; }
.result-card .cover .no-cover { font-size: 1.5rem; opacity: 0.4; }

.result-card .info { flex: 1; min-width: 0; }
.result-card .info .song-title {
  font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 0.9375rem; letter-spacing: -0.01em;
}
.result-card .info .song-meta {
  font-size: 0.8125rem; color: var(--text-secondary); margin-top: 0.35rem;
  display: flex; flex-wrap: wrap; gap: 0.15rem 1rem;
}
.result-card .info .song-meta .tag { display: inline-flex; align-items: center; gap: 0.25rem; }
.result-card .info .song-meta .tag .tag-icon { opacity: 0.5; font-size: 0.7rem; }

.result-card .right-info { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; flex-shrink: 0; }
.result-card .badge {
  font-size: 0.6875rem; padding: 0.2rem 0.65rem;
  border-radius: var(--radius-full); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap;
}
.badge-success { background: rgba(52,199,89,0.12); color: var(--success); }
.badge-error { background: rgba(255,59,48,0.12); color: var(--error); }
.badge-working { background: rgba(255,159,10,0.12); color: var(--warning); }

.result-card .size { font-size: 0.75rem; color: var(--text-tertiary); white-space: nowrap; }
.result-card .actions { display: flex; gap: 0.4rem; }
.result-card .actions button {
  padding: 0.4rem 0.9rem; border: none;
  border-radius: var(--radius-full);
  background: var(--bg-sunken);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 0.75rem; font-weight: 500; font-family: inherit;
  transition: all 0.25s var(--ease-spring);
  white-space: nowrap;
}
.result-card .actions button:hover { background: var(--bg-elevated); box-shadow: var(--shadow-sm); }
.result-card .actions button:active { transform: scale(0.93); }
.result-card .actions .btn-dl {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 6px rgba(0,113,227,0.25);
}
.result-card .actions .btn-dl:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(0,113,227,0.35); }

/* =========================================
   Footer
   ========================================= */
.footer { text-align: center; padding: 2rem 1rem; color: var(--text-tertiary); font-size: 0.75rem; line-height: 1.6; }
.footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
.footer a:hover { text-decoration: underline; }
.toast-wrap {
  position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none;
}
.toast {
  padding: 0.75rem 1.5rem;
  border-radius: var(--radius-full);
  font-size: 0.875rem; font-weight: 500;
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  animation: toastIn 0.45s var(--ease-bounce);
  max-width: 440px; pointer-events: auto;
  box-shadow: var(--shadow-lg);
  letter-spacing: -0.01em;
}
.toast.success { background: rgba(52,199,89,0.92); color: #fff; }
.toast.error { background: rgba(255,59,48,0.92); color: #fff; }

/* Metadata Detail */
.meta-detail { background: var(--bg-sunken); border-radius: var(--radius-sm); padding: 0.6rem 1rem; margin-top: 0.6rem; font-size: 0.75rem; display: none; }
.meta-detail.show { display: block; }
.meta-detail .meta-row { display: flex; padding: 0.18rem 0; }
.meta-detail .meta-row .meta-k { color: var(--accent); width: 80px; flex-shrink: 0; font-weight: 500; }
.meta-detail .meta-row .meta-v { color: var(--text-primary); word-break: break-all; }

/* Modal — iOS Sheet Style */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 9998;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.3s var(--ease-spring);
}
.modal {
  background: var(--bg-elevated);
  backdrop-filter: blur(50px) saturate(200%);
  -webkit-backdrop-filter: blur(50px) saturate(200%);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 1.75rem 1.5rem 2rem;
  max-width: 520px; width: 100%;
  box-shadow: var(--shadow-lg);
  animation: sheetUp 0.4s var(--ease-bounce);
}
.modal h3 { margin-bottom: 1rem; font-size: 1.125rem; font-weight: 600; letter-spacing: -0.01em; }
.modal label { display: block; font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 0.4rem; font-weight: 500; }
.modal input[type=text] {
  width: 100%; padding: 0.7rem;
  border-radius: var(--radius-sm); border: none;
  background: var(--bg-sunken); color: var(--text-primary);
  font-size: 0.9375rem; font-family: inherit;
  outline: none; transition: box-shadow 0.2s;
}
.modal input[type=text]:focus { box-shadow: 0 0 0 3px rgba(0,113,227,0.25); }
.modal .tip { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 0.4rem; }
.modal .tip a { color: var(--accent); }
.modal .btns { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }
.modal .btns button {
  padding: 0.65rem 1.5rem; border-radius: var(--radius-full); border: none;
  cursor: pointer; font-size: 0.875rem; font-weight: 500; font-family: inherit;
  background: var(--bg-sunken); color: var(--text-primary);
  transition: all 0.25s var(--ease-spring);
}
.modal .btns button:hover { background: var(--bg-elevated); }
.modal .btns button:active { transform: scale(0.96); }
.modal .btns .btn-ok {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 6px rgba(0,113,227,0.25);
}
.modal .btns .btn-ok:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(0,113,227,0.35); }

.modal pre {
  background: var(--bg-sunken); padding: 0.8rem;
  border-radius: var(--radius-sm); margin-top: 0.6rem;
  font-size: 0.85rem; font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
  overflow-x: auto;
}

/* Settings notice */
.settings-notice {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.7rem 1rem;
  background: rgba(255,159,10,0.06);
  border-radius: var(--radius-md);
  margin-top: 1.25rem;
  font-size: 0.8125rem; color: var(--text-secondary);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.settings-notice .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--warning); flex-shrink: 0;
  box-shadow: 0 0 6px rgba(255,159,10,0.4);
}

/* =========================================
   Animations
   ========================================= */
@keyframes toastIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
@keyframes breathe { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }

/* =========================================
   Search Modal Styles
   ========================================= */
.search-modal .modal { max-width: 600px; max-height: 80vh; overflow-y: auto; }
.search-loading { text-align: center; padding: 2rem; color: var(--text-secondary); }
.search-loading .spinner {
  width: 32px; height: 32px; border: 3px solid var(--bg-sunken);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

.search-result-card {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.85rem 1rem; border-radius: var(--radius-md);
  background: var(--bg-sunken); margin-bottom: 0.6rem;
  cursor: pointer; transition: all 0.2s var(--ease-spring);
  border: 2px solid transparent;
}
.search-result-card:hover { background: var(--bg-elevated); box-shadow: var(--shadow-sm); }
.search-result-card.selected { border-color: var(--accent); background: rgba(0,113,227,0.04); }
.search-result-card .provider-badge {
  font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: var(--radius-full);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
  flex-shrink: 0; min-width: 48px; text-align: center;
}
.provider-itunes { background: rgba(252,60,68,0.12); color: #fc3c44; }
.provider-musicbrainz { background: rgba(186,71,143,0.12); color: #ba478f; }
.provider-netease { background: rgba(198,47,45,0.12); color: #c62f2d; }
.provider-qqmusic { background: rgba(49,194,124,0.12); color: #31c27c; }
.search-result-card .search-info { flex: 1; min-width: 0; }
.search-result-card .search-info .search-title {
  font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-card .search-info .search-detail {
  font-size: 0.78rem; color: var(--text-secondary); margin-top: 0.2rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-card .search-cover {
  width: 42px; height: 42px; border-radius: 6px; background: var(--bg-sunken);
  flex-shrink: 0; overflow: hidden;
}
.search-result-card .search-cover img { width: 100%; height: 100%; object-fit: cover; }
.search-no-results { text-align: center; padding: 2rem; color: var(--text-tertiary); font-size: 0.9rem; }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" title="切换浅色/暗色模式" aria-label="切换浅色/暗色模式">☀️</button>

<div class="header">
  <h1>音乐解锁</h1>
  <p>在浏览器中解锁网易云音乐 .ncm 和 QQ 音乐 .qmc*/.mflac/.mgg 加密文件，完整保留元信息</p>
</div>

<div class="container">
  <div class="drop-zone" id="dropZone">
    <div class="icon">📂</div>
    <div class="title">点击选择或拖拽加密音乐文件到此处</div>
    <div class="hint">支持 .ncm / .qmc* / .mflac / .mgg — 所有运算均在本地完成，不会上传您的文件</div>
    <input type="file" id="fileInput" multiple accept=".ncm,.qmc0,.qmc1,.qmc3,.qmcogg,.qmcflac,.mflac,.mgg,.qmcmp3">
  </div>

  <div class="status-bar" id="statusBar" style="display:none">
    <span class="count" id="statusCount"></span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <button class="primary" onclick="downloadAll()"> 全部下载</button>
    <button onclick="clearAll()"> 清空列表</button>
    <button onclick="openSettings()"> 解密设定</button>
  </div>

  <div class="settings-notice" id="hostNotice" style="display:none">
    <span class="dot"></span>
    <span>直接打开此HTML无法加载 QMC 解密引擎和获取在线元数据。</span>
    <strong style="margin-left:.5rem;cursor:pointer;color:var(--accent);font-weight:600" onclick="showServerHint()">点击了解如何解决 →</strong>
  </div>

  <div class="results" id="results"></div>
</div>

  const blocks=[];
  while(!lastBlock&&pos+4<=audioData.length){
    const hdr=(audioData[pos]<<24)|(audioData[pos+1]<<16)|(audioData[pos+2]<<8)|audioData[pos+3];
    lastBlock=(hdr>>31)&1;
    const type=(hdr>>24)&0x7f,size=(hdr&0x00ffffff)>>>0;
    pos+=4;if(size===0){lastBlock=true;break}
    if(pos+size>audioData.length)break;
    blocks.push({type,data:audioData.slice(pos,pos+size),size});
    pos+=size;
  }
  const audioFrames=audioData.slice(pos);
  const enc=new TextEncoder();

  // Vorbis Comment
  const vendor=enc.encode('reference libFLAC 1.3.2 20170101');
  const comments=[];
  if(tags.title)comments.push(enc.encode('TITLE='+tags.title));
  if(tags.artist)comments.push(enc.encode('ARTIST='+tags.artist));
  if(tags.album)comments.push(enc.encode('ALBUM='+tags.album));
  if(tags.albumartist)comments.push(enc.encode('ALBUMARTIST='+tags.albumartist));
  if(tags.genre)comments.push(enc.encode('GENRE='+tags.genre));
  if(tags.year)comments.push(enc.encode('DATE='+tags.year));
  if(tags.track)comments.push(enc.encode('TRACKNUMBER='+tags.track));
  if(tags.disk)comments.push(enc.encode('DISCNUMBER='+tags.disk));
  if(tags.composer)comments.push(enc.encode('COMPOSER='+tags.composer));
  if(tags.publisher)comments.push(enc.encode('PUBLISHER='+tags.publisher));
  if(tags.copyright)comments.push(enc.encode('COPYRIGHT='+tags.copyright));
  if(tags.comment)comments.push(enc.encode('DESCRIPTION='+tags.comment));
  if(comments.length===0)comments.push(new Uint8Array(0));

  let vcs=4+vendor.length+4;
  for(const c of comments)vcs+=4+c.length;
  const vc=new Uint8Array(vcs);
  let vp=0;
  vc[vp++]=vendor.length&0xff;vc[vp++]=(vendor.length>>8)&0xff;vc[vp++]=(vendor.length>>16)&0xff;vc[vp++]=(vendor.length>>24)&0xff;
  vc.set(vendor,vp);vp+=vendor.length;
  vc[vp++]=comments.length&0xff;vc[vp++]=(comments.length>>8)&0xff;vc[vp++]=(comments.length>>16)&0xff;vc[vp++]=(comments.length>>24)&0xff;
  for(const c of comments){vc[vp++]=c.length&0xff;vc[vp++]=(c.length>>8)&0xff;vc[vp++]=(c.length>>16)&0xff;vc[vp++]=(c.length>>24)&0xff;vc.set(c,vp);vp+=c.length;}

  // Picture block
  let pic=null;
  if(tags.picture&&tags.picture.length>0){
    let mime='image/jpeg';
    if(tags.picture[0]===0x89&&tags.picture[1]===0x50)mime='image/png';
    const mb=enc.encode(mime),db=enc.encode('Cover');
    pic=new Uint8Array(4+4+mb.length+4+db.length+16+4+tags.picture.length);
    let pp=0;
    pic[pp++]=0;pic[pp++]=0;pic[pp++]=0;pic[pp++]=3;
    pic[pp++]=(mb.length>>24)&0xff;pic[pp++]=(mb.length>>16)&0xff;pic[pp++]=(mb.length>>8)&0xff;pic[pp++]=mb.length&0xff;pic.set(mb,pp);pp+=mb.length;
    pic[pp++]=(db.length>>24)&0xff;pic[pp++]=(db.length>>16)&0xff;pic[pp++]=(db.length>>8)&0xff;pic[pp++]=db.length&0xff;pic.set(db,pp);pp+=db.length;
    pp+=16;
    const il=tags.picture.length;
    pic[pp++]=(il>>24)&0xff;pic[pp++]=(il>>16)&0xff;pic[pp++]=(il>>8)&0xff;pic[pp++]=il&0xff;pic.set(tags.picture,pp);
  }

  const nb=[];
  for(const b of blocks){if(b.type===0)nb.push(b)}
  nb.push({type:4,data:vc});
  if(pic)nb.push({type:6,data:pic});
  for(const b of blocks){if(b.type!==0&&b.type!==4&&b.type!==6&&b.type!==1)nb.push(b)}

  const parts=[new Uint8Array([0x66,0x4c,0x61,0x43])];
  for(let i=0;i<nb.length;i++){
    const b=nb[i],isLast=i===nb.length-1;
    const h=(((isLast?1:0)<<31)|(b.type<<24)|b.data.length)>>>0;
    const hd=new Uint8Array(4);
    hd[0]=(h>>24)&0xff;hd[1]=(h>>16)&0xff;hd[2]=(h>>8)&0xff;hd[3]=h&0xff;
    parts.push(hd,b.data);
  }
  parts.push(audioFrames);
  const tl=parts.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(tl);let o=0;
  for(const p of parts){out.set(p,o);o+=p.length}
  return out;
}

function writeMetadata(audioData, tags, format){
  if(format==='mp3')return writeID3v2Tags(audioData,tags);
  if(format==='flac')return writeFLACMeta(audioData,tags);
  return audioData;
}

// ============================================================
//  QMC Decryption (QQ 音乐)
// ============================================================
const QMC_EXT_MAP = {
  'qmc0':'mp3','qmc1':'mp3','qmc3':'mp3','qmcmp3':'mp3',
  'qmcflac':'flac','qmcogg':'ogg','mflac':'flac','mgg':'ogg',
  'mflac0':'flac','mgg1':'ogg'
};
const QMC_CHUNK_SIZE = 0x100000; // 1MB chunks

function getQmcExt(filename){
  const ext = filename.split('.').pop().toLowerCase();
  return QMC_EXT_MAP[ext] || 'mp3';
}

function isQmcFile(filename){
  const ext = filename.split('.').pop().toLowerCase();
  return ext in QMC_EXT_MAP;
}

async function decryptQMC(rawData, filename, callbacks){
  if (!__qmcAvailable || !QmcCryptoModule) {
    var reason = '';
    if (typeof module === 'undefined') reason = ' (module 未定义)';
    else if (!module.exports) reason = ' (module.exports 为空)';
    else if (typeof module.exports !== 'function') reason = ' (module.exports type=' + typeof module.exports + ')';
    else if (!QmcCryptoModule) reason = ' (QmcCryptoModule 赋值失败)';
    throw new Error('QMC 解密引擎未加载' + reason + '。请通过本地服务器打开本页面：node server.js');
  }

  const totalLen = rawData.byteLength;
  const raw = new Uint8Array(rawData);

  callbacks.onProgress && callbacks.onProgress(5);

  // 初始化 QMC 解密引擎
  const qmc = await QmcCryptoModule();
  callbacks.onProgress && callbacks.onProgress(10);

  // 确定原始音频扩展名
  const audioExt = getQmcExt(filename);

  // 读取文件尾部用于密钥提取
  const tailSize = Math.min(QMC_CHUNK_SIZE, totalLen);
  const tailData = raw.slice(totalLen - tailSize);

  const tailPtr = qmc._malloc(tailSize);
  qmc.writeArrayToMemory(tailData, tailPtr);

  const footerSize = qmc.preDec(tailPtr, tailSize, '.' + audioExt);
  if (footerSize === -1) {
    qmc._free(tailPtr);
    throw new Error('QMC 密钥提取失败：' + (qmc.getErr ? qmc.getErr() : '文件格式不支持或已损坏'));
  }

  // 获取歌曲 ID
  const songIdStr = qmc.getSongId ? qmc.getSongId() : '0';
  const songId = (songIdStr === '0' || songIdStr === '') ? 0 : parseInt(songIdStr, 10);

  callbacks.onProgress && callbacks.onProgress(15);
  callbacks.onMeta && callbacks.onMeta({ musicId: songId, format: audioExt });

  // 解密音频数据
  const audioSize = totalLen - footerSize;
  const workPtr = qmc._malloc(QMC_CHUNK_SIZE);
  const chunks = [];
  let offset = 0;
  let remaining = audioSize;
  let lastPct = 15;

  while (remaining > 0) {
    const chunkSize = Math.min(remaining, QMC_CHUNK_SIZE);
    const chunkData = raw.slice(offset, offset + chunkSize);

    qmc.writeArrayToMemory(chunkData, workPtr);
    const decryptedLen = qmc.decBlob(workPtr, chunkSize, offset);
    chunks.push(new Uint8Array(qmc.HEAPU8.slice(workPtr, workPtr + decryptedLen)));

    offset += chunkSize;
    remaining -= chunkSize;

    const pct = 15 + Math.floor((offset / audioSize) * 80);
    if (pct > lastPct) { lastPct = pct; callbacks.onProgress && callbacks.onProgress(pct); }
  }

  qmc._free(tailPtr);
  qmc._free(workPtr);

  callbacks.onProgress && callbacks.onProgress(95);

  // 合并并检测格式
  const totalLenDecrypted = chunks.reduce((s, c) => s + c.length, 0);
  const audio = new Uint8Array(totalLenDecrypted);
  let pos = 0;
  for (const c of chunks) { audio.set(c, pos); pos += c.length; }

  const format = detectAudioFormat(audio);
  const id3Tags = parseID3v2(audio);
  const fallback = parseFilename(filename);

  // ---- Fetch online metadata via search API (QMC files lack embedded publisher/genre) ----
  let onlineMeta = null;
  const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (isLocalhost) {
    const searchArtist = id3Tags?.artist || fallback.artist;
    const searchTitle = id3Tags?.title || fallback.title;
    const searchQuery = (searchArtist ? searchArtist + ' ' : '') + searchTitle;
    if (searchQuery.trim().length > 3) {
      try {
        const resp = await fetch(
          `${location.protocol}//${location.host}/api/search?q=${encodeURIComponent(searchQuery)}&provider=all`,
          { signal: AbortSignal.timeout(10000) }
        );
        if (resp.ok) {
          const data = await resp.json();
          const all = [];
          const order = { itunes: 0, netease: 1, musicbrainz: 2, qqmusic: 3 };
          for (const p in data.results) {
            if (data.results[p]) {
              for (const item of data.results[p]) all.push(item);
            }
          }
          all.sort((a, b) => (order[a.provider] || 99) - (order[b.provider] || 99));
          if (all.length > 0) onlineMeta = all[0];
        }
      } catch (e) {
        console.log('[QMC] 在线元数据获取失败:', e.message);
      }
    }
  }

  // Merge: onlineMeta > id3Tags > fallback
  const title = onlineMeta?.title || id3Tags?.title || fallback.title;
  const artist = onlineMeta?.artist || id3Tags?.artist || fallback.artist;
  const album = onlineMeta?.album || id3Tags?.album || '';

  callbacks.onProgress && callbacks.onProgress(100);

  return {
    title, artist, artists: artist ? [[artist]] : [],
    album, albumartist: onlineMeta?.albumartist || id3Tags?.albumartist || artist,
    year: onlineMeta?.year || id3Tags?.year || '',
    genre: onlineMeta?.genre || id3Tags?.genre || '',
    track: onlineMeta?.track || id3Tags?.track || '',
    disk: onlineMeta?.disk || id3Tags?.disk || '',
    composer: onlineMeta?.composer || id3Tags?.composer || '',
    publisher: onlineMeta?.publisher || id3Tags?.publisher || '',
    copyright: id3Tags?.copyright || '',
    comment: onlineMeta?.comment || id3Tags?.comment || '',
    isrc: onlineMeta?.isrc || id3Tags?.isrc || '',
    bpm: id3Tags?.bpm || '',
    subType: '',
    format, mime: MIME_TYPES[format] || 'audio/mpeg',
    audio, image: null, imageUrl: onlineMeta?.coverUrl || null,
    rawMeta: { musicId: songId }, id3Tags, onlineMeta
  };
}

// ============================================================
//  NCM Constants
// ============================================================
const NCM_MAGIC=[0x43,0x54,0x45,0x4e,0x46,0x44,0x41,0x4d];
const AES_KEY_FOR_KEY_DATA=new Uint8Array([0x68,0x7a,0x48,0x52,0x41,0x6d,0x73,0x6f,0x35,0x6b,0x49,0x6e,0x62,0x61,0x78,0x57]);
const AES_KEY_FOR_META=new Uint8Array([0x23,0x31,0x34,0x6c,0x6a,0x6b,0x5f,0x21,0x5c,0x5d,0x26,0x30,0x55,0x3c,0x27,0x28]);
const META_PREFIX="163 key(Don't modify):";
const KEY_DATA_PREFIX='neteasecloudmusic';
const MIME_TYPES={mp3:'audio/mpeg',flac:'audio/flac',m4a:'audio/mp4',ogg:'audio/ogg',wav:'audio/wav',wma:'audio/x-ms-wma',ape:'audio/ape'};

// ============================================================
//  NCM RC4 Keybox
// ============================================================
function createKeyBox(keyData){
  const box=new Uint8Array(256);for(let i=0;i<256;i++)box[i]=i;
  let j=0;
  for(let i=0;i<256;i++){j=(box[i]+j+keyData[i%keyData.length])&0xff;[box[i],box[j]]=[box[j],box[i]]}
  const kb=new Uint8Array(256);
  for(let i=0;i<256;i++){const idx=(i+1)&0xff,n=box[idx],m=box[(idx+n)&0xff];kb[i]=box[(n+m)&0xff]}
  return kb;
}

function detectAudioFormat(buf){
  if(buf[0]===0xff&&(buf[1]&0xe0)===0xe0)return'mp3';
  if(buf[0]===0x66&&buf[1]===0x4c&&buf[2]===0x61&&buf[3]===0x43)return'flac';
  if(buf[0]===0x4f&&buf[1]===0x67&&buf[2]===0x67&&buf[3]===0x53)return'ogg';
  if(buf[0]===0x52&&buf[1]===0x49&&buf[2]===0x46&&buf[3]===0x46)return'wav';
  return'mp3';
}

function parseFilename(fn){
  let name=fn.replace(/\.(ncm|mp3|flac|m4a|ogg|wav|ape|wma)$/i,'');
  for(const s of[' - ',' — ','-','—']){const i=name.indexOf(s);if(i>0&&i<name.length-s.length)return{artist:name.slice(0,i).trim(),title:name.slice(i+s.length).trim()}}
  return{artist:'',title:name};
}

// ============================================================
//  NCM Decryption
// ============================================================
function safeGetU32(view,offset){try{if(offset<0||offset+4>view.byteLength)return null;return view.getUint32(offset,true)}catch(e){return null}}

async function decryptNCM(rawData,filename,callbacks={}){
  const totalLen=rawData.byteLength;
  const raw=new Uint8Array(rawData);
  const view=new DataView(rawData);
  let offset=0;
  const log=(m)=>console.log('[NCM]',m);

  if(totalLen<10)throw new Error('文件太小，不是有效的 NCM 文件');
  for(let i=0;i<8;i++)if(raw[i]!==NCM_MAGIC[i])throw new Error('不是有效的 NCM 文件（魔数不匹配）');
  offset=10;
  callbacks.onProgress&&callbacks.onProgress(5);

  // Get key
  let keyLen=safeGetU32(view,offset);
  if(keyLen===null)throw new Error(`无法读取密钥长度（位置 ${offset}，总长 ${totalLen}）`);
  offset+=4;
  if(keyLen<=0||keyLen>2048||offset+keyLen>totalLen)throw new Error(`密钥数据异常：长度=${keyLen}，位置=${offset}，总长=${totalLen}`);
  const keyXor=raw.slice(offset,offset+keyLen);offset+=keyLen;
  for(let i=0;i<keyXor.length;i++)keyXor[i]^=0x64;
  const keyDecrypted=aesEcbDecrypt(keyXor,AES_KEY_FOR_KEY_DATA);
  const keyData=keyDecrypted.slice(KEY_DATA_PREFIX.length);
  if(keyData.length<8)throw new Error('密钥解密失败，文件可能已损坏');
  callbacks.onProgress&&callbacks.onProgress(15);

  const keyBox=createKeyBox(keyData);
  callbacks.onProgress&&callbacks.onProgress(20);

  // Get metadata JSON from NCM
  let metaLen=safeGetU32(view,offset);
  if(metaLen===null)throw new Error(`无法读取元数据长度（位置 ${offset}）`);
  offset+=4;
  let oriMeta={};
  if(metaLen>0&&offset+metaLen<=totalLen){
    const metaXor=new Uint8Array(raw.slice(offset,offset+metaLen));offset+=metaLen;
    for(let i=0;i<metaXor.length;i++)metaXor[i]^=0x63;
    const metaBody=metaXor.slice(META_PREFIX.length);
    let metaDecrypted=null;
    try{const b64=new TextDecoder().decode(metaBody);const ct=base64ToBytes(b64);if(ct.length>=16&&ct.length%16===0)metaDecrypted=aesEcbDecrypt(ct,AES_KEY_FOR_META)}catch(e){}
    if(!metaDecrypted){
      try{const hex=new TextDecoder().decode(metaBody).replace(/[^0-9a-fA-F]/g,'');if(hex.length>=32&&hex.length%32===0)metaDecrypted=aesEcbDecrypt(new Uint8Array(hex.match(/.{2}/g).map(b=>parseInt(b,16))),AES_KEY_FOR_META)}catch(e){}
    }
    if(metaDecrypted){
      try{
        const jsonStr=new TextDecoder().decode(metaDecrypted);
        const ci=jsonStr.indexOf(':');
        if(ci>0){
          const obj=JSON.parse(jsonStr.slice(ci+1));
          oriMeta=jsonStr.slice(0,ci)==='dj'?(obj.mainMusic||{}):obj;
        }
      }catch(e){log('元数据JSON解析失败: '+e.message)}
    }
    if(oriMeta.albumPic)oriMeta.albumPic=oriMeta.albumPic.replace(/^http:\/\//,'https://')+'?param=500y500';
  }
  callbacks.onProgress&&callbacks.onProgress(30);
  callbacks.onMeta&&callbacks.onMeta(oriMeta,{offset,total:totalLen});

  // Get audio
  if(offset>=totalLen)throw new Error(`元数据后无剩余数据（位置 ${offset}，总长 ${totalLen}）`);
  let audioStart=offset;
  const imgLen=safeGetU32(view,offset+5);
  if(imgLen!==null&&imgLen>=0&&imgLen<=20*1024*1024){
    const candidate=offset+imgLen+13;
    if(candidate>offset&&candidate<totalLen)audioStart=candidate;
  }
  if(audioStart>=totalLen-4)audioStart=offset;

  const encryptedAudio=raw.slice(audioStart);
  const audio=new Uint8Array(encryptedAudio.length);
  const total=encryptedAudio.length;
  let lastPct=30;
  for(let i=0;i<total;i++){
    audio[i]=encryptedAudio[i]^keyBox[i&0xff];
    if(i%50000===0||i===total-1){
      const pct=30+Math.floor(i/total*65);
      if(pct>lastPct){lastPct=pct;callbacks.onProgress&&callbacks.onProgress(pct)}
    }
  }
  callbacks.onProgress&&callbacks.onProgress(95);

  // ---- Fetch online metadata from NetEase (if server proxy available) ----
  const musicId = oriMeta.musicId || '';
  let onlineMeta = null;
  if (musicId && musicId !== 0 && musicId !== '0') {
    try {
      // Try local proxy first (when served via server.js)
      const apiUrl = `${location.protocol}//${location.host}/api/metadata?musicId=${musicId}`;
      const resp = await fetch(apiUrl, { signal: AbortSignal.timeout(8000) });
      if (resp.ok) {
        onlineMeta = await resp.json();
        log('在线获取元数据成功: ' + (onlineMeta.year || '?') + ' ' + (onlineMeta.genre || ''));
      }
    } catch (e) {
      log('在线获取元数据失败: ' + e.message);
    }
  }

  // ---- Extract all metadata from NCM JSON + decrypted audio ID3 tags ----
  const id3Tags=parseID3v2(audio); // Parse ID3v2 tags from decrypted audio
  const fallback=parseFilename(filename);

  // Merge: onlineMeta > ID3 tags > NCM JSON > filename fallback
  const title = onlineMeta?.title || id3Tags?.title || oriMeta.musicName || fallback.title;

  // Artist — use online meta first if available
  let artists=[];
  if(onlineMeta?.artists?.length>0){
    for(const name of onlineMeta.artists) artists.push([name]);
  }else if(typeof oriMeta.artist==='string')artists=[[oriMeta.artist]];
  else if(Array.isArray(oriMeta.artist)){
    for(const item of oriMeta.artist){
      if(typeof item==='string')artists.push([item]);
      else if(Array.isArray(item)&&item.length>0)artists.push([item[0]]);
    }
  }
  if(artists.length===0&&id3Tags?.artist)artists=id3Tags.artist.split(';').map(s=>[s.trim()]).filter(s=>s[0]);
  if(artists.length===0&&fallback.artist)artists=fallback.artist.split(',').map(s=>[s.trim()]).filter(s=>s[0]);
  const artistStr=artists.map(a=>Array.isArray(a)?a[0]:a).filter(Boolean).join('; ');

  const album = onlineMeta?.album || oriMeta.album || id3Tags?.album || '';
  const albumartist = onlineMeta?.albumartist || id3Tags?.albumartist || artistStr;
  const year = onlineMeta?.year || id3Tags?.year || '';
  const genre = onlineMeta?.genre || id3Tags?.genre || '';
  const track = onlineMeta?.track || id3Tags?.track || '';
  const disk = onlineMeta?.disc || id3Tags?.disk || '';
  const composer = onlineMeta?.originSong?.artists?.join(', ') || id3Tags?.composer || '';
  const publisher = onlineMeta?.publisher || id3Tags?.publisher || '';
  const copyright = id3Tags?.copyright || '';
  const comment = onlineMeta?.description || id3Tags?.comment || '';
  const isrc = id3Tags?.isrc || '';
  const bpm = id3Tags?.bpm || '';
  const subType = onlineMeta?.subType || '';

  const format=oriMeta.format||detectAudioFormat(audio);

  // Download cover from URL
  let imageData=null;
  if(oriMeta.albumPic){
    try{const resp=await fetch(oriMeta.albumPic);if(resp.ok)imageData=new Uint8Array(await resp.arrayBuffer())}catch(e){}
  }
  callbacks.onProgress&&callbacks.onProgress(100);

  return{
    title,artist:artistStr,artists,album,albumartist,
    year,genre,track,disk,composer,publisher,copyright,
    comment,isrc,bpm,subType,
    format,mime:MIME_TYPES[format]||'audio/mpeg',
    audio,image:imageData,imageUrl:oriMeta.albumPic||null,
    rawMeta:oriMeta,id3Tags:id3Tags,onlineMeta
  };
}

function toast(msg,type){const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;document.getElementById('toastWrap').appendChild(el);setTimeout(function(){el.remove()},3000)}

function updateStatus(){
  const bar=document.getElementById('statusBar'),tb=document.getElementById('toolbar');

function formatSize(bytes){
  if(bytes<1024)return bytes+' B';if(bytes<1048576)return(bytes/1024).toFixed(1)+' KB';
  return(bytes/1048576).toFixed(1)+' MB';
}

let expandedCards={};

function toggleDetail(idx){
  expandedCards[idx]=!expandedCards[idx];
  renderResults();

function renderResults(){

    let badgeHTML='';
    if(r.status==='working')badgeHTML='<span class="badge badge-working">解密中</span>';

    else badgeHTML='<span class="badge badge-success">'+r.format.toUpperCase()+'</span>';

      ?'<button class="btn-dl" onclick="downloadResult('+i+')">⬇ 下载</button><button onclick="toggleDetail('+i+')">详情</button>'+(isLocalhost?'<button onclick="reSearch('+i+')" title="重新搜索在线元信息">🔍 元信息</button>':'')
      :r.status==='error'
        ?'<button onclick="removeResult('+i+')">✕ 移除</button>'
        :'';

    const metaTags=[];
    if(r.artist)metaTags.push('<span class="tag"><span class="tag-icon">🎤</span>'+r.artist+'</span>');
    if(r.album)metaTags.push('<span class="tag"><span class="tag-icon">💿</span>'+r.album+'</span>');
    if(r.year)metaTags.push('<span class="tag"><span class="tag-icon">📅</span>'+r.year+'</span>');
    if(r.genre)metaTags.push('<span class="tag"><span class="tag-icon">🎶</span>'+r.genre+'</span>');
    if(r.track)metaTags.push('<span class="tag"><span class="tag-icon">🎵</span>#'+r.track+'</span>');

    const expanded=expandedCards[i];
    const detailFields=[];
    if(r.albumartist&&r.albumartist!==r.artist)detailFields.push(['专辑艺术家',r.albumartist]);
    if(r.composer)detailFields.push(['作曲',r.composer]);
    if(r.publisher)detailFields.push(['发行方',r.publisher]);
    if(r.subType)detailFields.push(['类型',r.subType]);
    if(r.disk)detailFields.push(['碟/轨',r.track?r.disk+'/'+r.track:r.disk]);
    if(r.isrc)detailFields.push(['ISRC',r.isrc]);
    if(r.bpm)detailFields.push(['BPM',r.bpm]);
    if(r.copyright)detailFields.push(['版权',r.copyright]);
    if(r.comment)detailFields.push(['备注',r.comment]);
    var detailHTML='';
    if(expanded&&detailFields.length>0){
      detailHTML='<div class="meta-detail show">'+detailFields.map(function(f){return '<div class="meta-row"><span class="meta-k">'+f[0]+'</span><span class="meta-v">'+f[1]+'</span></div>'}).join('')+'</div>';
    }else if(expanded&&detailFields.length===0){
      detailHTML='<div class="meta-detail show"><div class="meta-row"><span class="meta-v" style="color:var(--text-tertiary)">没有更多信息</span></div></div>';
    }

    return '<div class="result-card"><div class="cover">'+coverHTML+'</div><div class="info"><div class="song-title">'+(r.status==='working'?'正在解密...':(r.title||r.filename))+'</div><div class="song-meta">'+(metaTags.join('')||'<span style="color:var(--text-tertiary)">等待中...</span>')+'</div>'+detailHTML+'</div><div class="right-info">'+badgeHTML+'<span class="size">'+sizeStr+'</span><div class="actions">'+actionsHTML+'</div></div></div>';
  }).join('');
  updateStatus();
}

async function processFile(file){
  const idx=results.length;
  const entry={filename:file.name,title:file.name.replace(/\.[^.]+$/i,''),artist:'',album:'',albumartist:'',year:'',genre:'',track:'',disk:'',composer:'',publisher:'',copyright:'',comment:'',isrc:'',bpm:'',subType:'',format:'mp3',imageUrl:null,audio:null,image:null,status:'working'};
  const isQmc = isQmcFile(file.name);
  const isNcm = file.name.toLowerCase().endsWith('.ncm');
  results.push(entry);renderResults();updateStatus();

  try{
    const rawData=await file.arrayBuffer();
    let result;

    if (isQmc) {
      // QMC / QQ音乐 解密
      result = await decryptQMC(rawData, file.name, {
        onProgress(pct){},
        onMeta(meta){
          if (meta.format) entry.format = meta.format;
          renderResults();
        }
      });
    } else if (isNcm) {
      // NCM / 网易云音乐 解密
      result = await decryptNCM(rawData, file.name, {
        onProgress(pct){},
        onMeta(meta){
          if(meta.albumPic)entry.imageUrl=meta.albumPic;
          if(meta.musicName)entry.title=meta.musicName;
          entry.album=meta.album||entry.album;
          renderResults();
        }
      });
    } else {
      throw new Error('不支持的加密格式: ' + file.name);
    }

    const tags={
      title:result.title,artist:result.artist,album:result.album,
      albumartist:result.albumartist,year:result.year,genre:result.genre,
      track:result.track,disk:result.disk,composer:result.composer,
      publisher:result.publisher,copyright:result.copyright,comment:result.comment,
      isrc:result.isrc,bpm:result.bpm,
      picture:result.image
    };
    const audioWithMeta=writeMetadata(result.audio,tags,result.format);

    Object.assign(entry,{
      title:result.title,artist:result.artist,album:result.album,
      albumartist:result.albumartist,year:result.year,genre:result.genre,
      track:result.track,disk:result.disk,composer:result.composer,
      publisher:result.publisher,copyright:result.copyright,
      comment:result.comment,isrc:result.isrc,bpm:result.bpm,
      subType:result.subType,
      format:result.format,audio:audioWithMeta,image:result.image,
      imageUrl:result.imageUrl||entry.imageUrl,mime:result.mime,status:'done'
    });
  }catch(err){
    console.error(err);
    entry.status='error';entry.error=err.message;
    toast(file.name + ' - ' + err.message, 'error');
  }
  renderResults();updateStatus();
  if(entry.status==='done'){
    toast('解锁成功: ' + entry.title, 'success');
    // Auto-trigger metadata search
    var isLocalhost=location.hostname==='localhost'||location.hostname==='127.0.0.1';
    if(isLocalhost){setTimeout(function(){autoSearch(idx)},500)}
  }
}

function downloadResult(idx){
  var r=results[idx];if(!r||r.status!=='done'||!r.audio)return;
  var ar=(r.artist||'').replace(/[\\/:*?"<>|]/g,'_');
  var ti=(r.title||r.filename).replace(/[\\/:*?"<>|]/g,'_');
  var fn=ar?ar+' - '+ti+'.'+r.format:ti+'.'+r.format;
  var blob=new Blob([r.audio],{type:r.mime||'audio/mpeg'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=fn;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function removeResult(idx){results.splice(idx,1);renderResults();updateStatus()}
function downloadAll(){var done=results.filter(function(r){return r.status==='done'});if(done.length===0){toast('没有可下载的文件','error');return}done.forEach(function(_,i){setTimeout(function(){var idx=results.indexOf(done[i]);if(idx>=0)downloadResult(idx)},i*300)});toast('开始下载 ' + done.length + ' 个文件','success')}
function clearAll(){results.length=0;renderResults();updateStatus()}

// ============================================================
//  Metadata Search (v2.4)
// ============================================================
async function autoSearch(idx){
  var r=results[idx];
  if(!r||r.status!=='done') return;

  var query=(r.artist?r.artist+' ':'')+(r.title||r.filename);
  showSearchModal(query, idx);
}

function reSearch(idx){
  var r=results[idx];
  if(!r||r.status!=='done') return;

  // 用当前已设置的艺术家和标题作为搜索词
  var query=(r.artist?r.artist+' ':'')+(r.title||r.filename);
  showSearchModal(query, idx);
}

async function showSearchModal(query, cardIdx){
  var r=results[cardIdx];
  var overlay=document.createElement('div'); overlay.className='modal-overlay search-modal';
  overlay.innerHTML='<div class="modal"><h3>🔍 搜索元信息</h3><p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:.5rem">"'+query+'"</p><div class="search-loading"><div class="spinner"></div>正在搜索 Apple Music / MusicBrainz / QQ音乐 / 网易云...</div></div>';
  document.body.appendChild(overlay);

  try{
    var apiBase=location.protocol+'//'+location.host;
    var resp=await fetch(apiBase+'/api/search?q='+encodeURIComponent(query)+'&provider=all',{signal:AbortSignal.timeout(20000)});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    var data=await resp.json();
    var allResults=[];
    for(var provider in data.results){
      if(data.results[provider]){
        for(var j=0;j<data.results[provider].length;j++){
          allResults.push(data.results[provider][j]);
        }
      }
    }
    renderSearchResults(overlay, allResults, cardIdx, query);
  }catch(e){
    overlay.querySelector('.search-loading').innerHTML='<div class="search-no-results">搜索失败: '+e.message+'<br><small style="color:var(--text-tertiary)">请确认已通过 node server.js 启动本地服务器</small></div>';
  }

  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove()});
}

function renderSearchResults(overlay, allResults, cardIdx, query){
  _searchResults=allResults;  // 缓存供 selectSearchResult 使用
  var modal=overlay.querySelector('.modal');

  if(allResults.length===0){
    modal.innerHTML='<h3>🔍 搜索元信息</h3><p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:.5rem">"'+query+'"</p><div class="search-no-results">未找到匹配的元信息</div><div class="btns"><button onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div>';
    return;
  }

  // Sort: itunes > netease > musicbrainz > qqmusic
  var order={itunes:0,netease:1,musicbrainz:2,qqmusic:3};
  allResults.sort(function(a,b){return(order[a.provider]||99)-(order[b.provider]||99)});

  var html='<h3>🔍 搜索元信息</h3><p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:.8rem">"'+query+'" — 找到 '+allResults.length+' 条结果</p>';

  for(var i=0;i<Math.min(allResults.length,10);i++){
    var r=allResults[i];
    var provClass='provider-'+r.provider;
    var provName={itunes:'Apple Music',musicbrainz:'MusicBrainz',netease:'网易云音乐',qqmusic:'QQ音乐'}[r.provider]||r.provider;
    var details=[];
    if(r.year)details.push(r.year);
    if(r.album)details.push('「'+r.album+'」');
    if(r.genre)details.push(r.genre);
    if(r.isrc)details.push('ISRC:'+r.isrc);
    var coverHTML=r.coverUrl?'<img src="'+r.coverUrl+'" onerror="this.style.display=\'none\'" loading="lazy">':'';
    html+='<div class="search-result-card" onclick="selectSearchResult('+i+','+cardIdx+',this)" data-idx="'+i+'"><span class="provider-badge '+provClass+'">'+provName+'</span><div style="flex:1;min-width:0"><div class="search-title">'+r.title+' — '+r.artist+'</div><div class="search-detail">'+(details.join(' · ')||'「'+r.album+'」')+'</div></div>'+(coverHTML?'<div class="search-cover">'+coverHTML+'</div>':'')+'</div>';
  }

  html+='<div class="btns"><button onclick="this.closest(\'.modal-overlay\').remove()">跳过</button></div>';
  modal.innerHTML=html;
}

function selectSearchResult(resultIdx, cardIdx, el){
  var overlay=el.closest('.modal-overlay');
  var cards=overlay.querySelectorAll('.search-result-card');
  for(var i=0;i<cards.length;i++) cards[i].classList.remove('selected');
  el.classList.add('selected');

  var selected=_searchResults[resultIdx];
  if(!selected||!results[cardIdx]) return;

  var r=results[cardIdx];
  // Merge enriched metadata into result
  r._enrichedMeta=selected;

  // Download cover image if available
  if(selected.coverUrl&&!r._enrichedMeta._coverBuffer){
    var apiBase=location.protocol+'//'+location.host;
    fetch(apiBase+'/api/proxy/image?url='+encodeURIComponent(selected.coverUrl))
      .then(function(resp){if(resp.ok)return resp.arrayBuffer()})
      .then(function(buf){if(buf){r._enrichedMeta._coverBuffer=new Uint8Array(buf);r.imageUrl=selected.coverUrl}})
      .catch(function(){});
  }

  // Update display
  if(selected.title) r.title=selected.title;
  if(selected.artist) r.artist=selected.artist;
  if(selected.album) r.album=selected.album;
  if(selected.albumartist) r.albumartist=selected.albumartist;
  if(selected.year) r.year=selected.year;
  if(selected.genre) r.genre=selected.genre;
  if(selected.track) r.track=selected.track;
  if(selected.disk) r.disk=selected.disk;
  if(selected.composer) r.composer=selected.composer;
  if(selected.publisher) r.publisher=selected.publisher;
  if(selected.isrc) r.isrc=selected.isrc;
  if(selected.coverUrl) r.imageUrl=selected.coverUrl;

  renderResults();
  overlay.remove();
  toast('✓ 已应用 ' + ({itunes:'Apple Music',musicbrainz:'MusicBrainz',netease:'网易云音乐',qqmusic:'QQ音乐'}[selected.provider]||selected.provider) + ' 元信息', 'success');
}

// Override downloadResult to use enriched metadata
var _originalDownloadResult=downloadResult;
downloadResult=function(idx){
  var r=results[idx]; if(!r||r.status!=='done'||!r.audio)return;

  // If enriched metadata exists, re-write tags at download time
  var audio=r.audio;
  if(r._enrichedMeta){
    var tags={
      title:r._enrichedMeta.title||r.title,
      artist:r._enrichedMeta.artist||r.artist,
      album:r._enrichedMeta.album||r.album,
      albumartist:r._enrichedMeta.albumartist||r.albumartist,
      year:r._enrichedMeta.year||r.year,
      genre:r._enrichedMeta.genre||r.genre,
      track:r._enrichedMeta.track||r.track,
      disk:r._enrichedMeta.disk||r.disk,
      composer:r._enrichedMeta.composer||r.composer,
      publisher:r._enrichedMeta.publisher||r.publisher,
      copyright:r._enrichedMeta.copyright||r.copyright,
      comment:r._enrichedMeta.comment||r.comment,
      isrc:r._enrichedMeta.isrc||r.isrc,
      bpm:r._enrichedMeta.bpm||r.bpm,
      picture:r._enrichedMeta._coverBuffer||r.image
    };
    audio=writeMetadata(r.audio,tags,r.format);

    // Update display name
    if(r._enrichedMeta.title) r.title=r._enrichedMeta.title;
    if(r._enrichedMeta.artist) r.artist=r._enrichedMeta.artist;
  }

  var ar=(r.artist||'').replace(/[\\/:*?"<>|]/g,'_');
  var ti=(r.title||r.filename).replace(/[\\/:*?"<>|]/g,'_');
  var fn=ar?ar+' - '+ti+'.'+r.format:ti+'.'+r.format;
  var blob=new Blob([audio],{type:r.mime||'audio/mpeg'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=fn;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
};

function openSettings(){
  var overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML='<div class="modal"><h3>⚙ 解密设定</h3><label>JOOX UUID <small style="color:var(--text-tertiary)">（仅 JOOX 文件需要）</small></label><input type="text" id="jooxUUIDInput" value="'+jooxUUID+'" maxlength="32" placeholder="32位十六进制 UUID"><div class="tip">获取方式见 <a href="https://git.unlock-music.dev/um/joox-crypto/wiki/%E8%8E%B7%E5%8F%96%E8%AE%BE%E5%A4%87-UUID" target="_blank">Wiki</a></div><div class="btns"><button onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn-ok" id="saveSettings">确定</button></div></div>';
  document.body.appendChild(overlay);
  document.getElementById('saveSettings').onclick=function(){jooxUUID=document.getElementById('jooxUUIDInput').value.trim();localStorage.setItem('um_joox_uuid',jooxUUID);overlay.remove();toast('设定已保存','success')};
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove()});

const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',(e)=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',(e)=>{e.preventDefault();dropZone.classList.remove('dragover');handleFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',()=>{handleFiles(fileInput.files);fileInput.value=''});

function handleFiles(files){
  const encryptedFiles=[];for(const f of files){if(f.name.toLowerCase().endsWith('.ncm')||isQmcFile(f.name))encryptedFiles.push(f)}
  if(encryptedFiles.length===0){toast('请选择 .ncm / .qmc* / .mflac / .mgg 等加密音乐文件','error');return}
  if(!__qmcAvailable&&encryptedFiles.some(function(f){return isQmcFile(f.name)})){
    document.getElementById('hostNotice').style.display='flex';
  }
  toast('已添加 ' + encryptedFiles.length + ' 个文件', 'success');
  for(var i=0;i<encryptedFiles.length;i++)processFile(encryptedFiles[i]);
}

  document.body.appendChild(o);

// ---- Theme Toggle ----
(function(){
  var toggle = document.getElementById('themeToggle');
  var root = document.documentElement;
  var theme = localStorage.getItem('um_theme') || 'auto';
  var icons = { auto: '🌗', light: '☀️', dark: '🌙' };

  function applyTheme(t) {
    root.removeAttribute('data-theme');
    if (t === 'light' || t === 'dark') root.setAttribute('data-theme', t);
    toggle.textContent = icons[t] || icons.auto;
    localStorage.setItem('um_theme', t);
  }

  applyTheme(theme);

  toggle.addEventListener('click', function() {
    if (theme === 'auto') theme = 'dark';
    else if (theme === 'dark') theme = 'light';
    else theme = 'auto';
    applyTheme(theme);
  });
})();
